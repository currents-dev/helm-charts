name: Lint and Test Charts

on: pull_request

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC (assume the ECR pull role)
      contents: read    # Required for checkout
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.1
        with:
          version: v3.21.2

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.x'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0
        with:
          yamale_version: "6.0.0"

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --check-version-increment=false --target-branch ${{ github.event.repository.default_branch }}

      - name: Configure AWS credentials
        if: steps.list-changed.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::761136292957:role/GitHubActions-CurrentsDevDocker-ECRPull
          aws-region: us-east-1

      - name: Login to Currents ECR
        if: steps.list-changed.outputs.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "513558712013"

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.14.0

      # The chart pulls private images from Currents' ECR. kind nodes don't share
      # the runner's registry auth, so pull on the runner (authenticated above) and
      # side-load into the cluster. imagePullPolicy defaults to IfNotPresent, so the
      # pods use these preloaded images without needing an in-cluster pull secret.
      - name: Preload Currents images into kind
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          images=$(helm template ct-release charts/currents -f charts/currents/ci/lint-values.yaml \
            | awk '$1 == "image:" { print $2 }' | tr -d '"' | grep '513558712013' | sort -u)
          echo "Preloading images into kind:"
          echo "$images"
          for img in $images; do
            docker pull "$img"
            kind load docker-image "$img" --name chart-testing
          done

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --target-branch ${{ github.event.repository.default_branch }}