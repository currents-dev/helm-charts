global:
  # Reference to one or more secrets to be used when pulling images.
  # For more information, see [Pull an Image from a Private Registry](https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/).
  #
  # For example:
  imagePullSecrets:
    - name: "currents-pull-secret"
  imagePullPolicy: Always
  ingressClassName: currents-nginx

currents:
  ingress:
    enabled: true
  domains:
    https: false
    appHost: currents-app.localhost
    recordApiHost: currents-record.localhost
  imageTag: staging
  apiJwtToken:
    secretName: currents-api-jwt-token
  apiInternalToken:
    secretName: currents-api-internal-token
  gitlab:
    state:
      secretName: currents-gitlab-key 
      secretKey: gitlab-key.pem
  mongoConnection:
    secretName: mongodb-currents-currents-user
    key: connectionString.standardSrv
  clickhouse:
    user:
      secretName: clickhouse-currents-pass
      secretPasswordKey: password
    tls:
      enabled: false
    host: clickhouse-clickhouse
  objectStorage:
    endpoint: http://rustfs.localhost
    internalEndpoint: http://rustfs
    secretName: currents-rustfs-user
    secretIdKey: RUSTFS_ACCESS_KEY
    secretAccessKey: RUSTFS_SECRET_KEY
    bucket: currents
    pathStyle: true

redis:
  enabled: true